# SkyBound Missions Configuration
# Each mission supports multiple conditions with AND/OR logic.
#
# Condition types:
#   BREAK_BLOCK, PLACE_BLOCK, KILL_MOB, CRAFT_ITEM, SMELT_ITEM, BREW_POTION,
#   ENCHANT_ITEM, FISH, HARVEST, SHEAR, BREED, TAME, ISLAND_LEVEL, ISLAND_VALUE,
#   BANK_DEPOSIT, SHOP_BUY, SHOP_SELL, GENERATOR_COLLECT, PICKUP_ITEM, EAT,
#   WALK_DISTANCE, GAIN_XP, CUSTOM
#
# Condition mode: AND (all must be met) or OR (any one is enough)
# target: material/entity name, or empty "" for any

missions:

  # === MINING ===
  miner_1:
    display-name: "&eMiner I"
    category: "mining"
    icon: WOODEN_PICKAXE
    required-level: 1
    prerequisites: []
    repeatable: false
    time-limit-seconds: 0
    conditions:
      mode: AND
      list:
        - type: BREAK_BLOCK
          target: COAL_ORE
          amount: 30
        - type: BREAK_BLOCK
          target: IRON_ORE
          amount: 15
    rewards:
      money: 300.0
      island-xp: 30
      items:
        - material: IRON_INGOT
          amount: 5
      commands: []
    lore:
      - "&7Mine coal and iron ore"
      - "&7to start your mining career."

